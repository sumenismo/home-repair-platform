name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: home_repair_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/home_repair_test
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    env:
      REGISTRY: registry.digitalocean.com
      IMAGE_REPO: ${{ secrets.DO_REGISTRY_NAME }}/home-repair

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate types
        run: pnpm codegen

      - name: Run database migrations
        working-directory: packages/db
        run: pnpm exec node-pg-migrate up
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push API image
        run: |
          docker build --progress=plain -f apps/api/Dockerfile \
            -t $REGISTRY/$IMAGE_REPO:api-${{ github.sha }} \
            -t $REGISTRY/$IMAGE_REPO:api-latest .
          for i in 1 2 3; do
            docker push $REGISTRY/$IMAGE_REPO:api-${{ github.sha }} && \
            docker push $REGISTRY/$IMAGE_REPO:api-latest && break
            echo "Push attempt $i failed, retrying…"; sleep 10
          done

      - name: Build and push web image
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }} \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t $REGISTRY/$IMAGE_REPO:web-${{ github.sha }} \
            -t $REGISTRY/$IMAGE_REPO:web-latest .
          for i in 1 2 3; do
            docker push $REGISTRY/$IMAGE_REPO:web-${{ github.sha }} && \
            docker push $REGISTRY/$IMAGE_REPO:web-latest && break
            echo "Push attempt $i failed, retrying…"; sleep 10
          done

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: mkdir -p /opt/home-repair

      - name: Copy compose file to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: /opt/home-repair/

      - name: Clean up old registry tags
        run: |
          for REPO in api web; do
            doctl registry repository list-tags ${{ secrets.DO_REGISTRY_NAME }}/home-repair \
              --no-header --format Tag \
              | grep "^${REPO}-" \
              | grep -v "^${REPO}-${{ github.sha }}$" \
              | xargs -I{} doctl registry repository delete-tag \
                  ${{ secrets.DO_REGISTRY_NAME }}/home-repair {} --force || true
          done
          doctl registry garbage-collection start \
            --include-untagged-manifests --force \
            ${{ secrets.DO_REGISTRY_NAME }} || true

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: DO_TOKEN,DO_REGISTRY_NAME,DATABASE_URL,SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY
          script: |
            {
              echo "DO_REGISTRY_NAME=$DO_REGISTRY_NAME"
              echo "DATABASE_URL=$DATABASE_URL"
              echo "SUPABASE_URL=$SUPABASE_URL"
              echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
              echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
              echo "PORT=4000"
            } > /opt/home-repair/.env
            cd /opt/home-repair
            echo "$DO_TOKEN" | docker login registry.digitalocean.com -u unused --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
        env:
          DO_TOKEN: ${{ secrets.DO_ACCESS_TOKEN }}
          DO_REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
